name: Fetch OSE gauges

# Runs every 30 minutes, around the clock. The gauges themselves only report
# every 15 minutes, so this keeps the published data at most ~30 min behind.
on:
  schedule:
    - cron: "7,37 * * * *"
  workflow_dispatch: {}         # manual "Run workflow" button on the Actions tab

permissions:
  contents: write               # needed to commit the updated data files

concurrency:                    # never let two runs collide on a push
  group: fetch-gauges
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - run: pip install requests

      - run: python fetch_ose_gauges.py

      - name: Commit updated data
        run: |
          git config user.name  "gauge-bot"
          git config user.email "gauge-bot@users.noreply.github.com"
          git add data
          if git diff --staged --quiet; then
            echo "No new readings."
          else
            git commit -m "data: gauge readings $(date -u +%FT%TZ)"
            git push
          fi
